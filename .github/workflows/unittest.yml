name: unit-tests

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Run stable unit tests
        run: >
          go test
          ./logging
          ./pkg/annotations
          ./pkg/daemon
          ./pkg/k8sclient
          ./pkg/types
          ./usrspcni
