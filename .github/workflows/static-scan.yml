name: Go-static-analysis

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  go-check:
    name: Go checks
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Check formatting
        run: |
          files="$(gofmt -l .)"
          if [ -n "$files" ]; then
            echo "$files"
            exit 1
          fi

      - name: Vet stable packages
        run: >
          go vet
          ./logging
          ./pkg/annotations
          ./pkg/daemon
          ./pkg/k8sclient
          ./pkg/types
          ./usrspcni

      - name: Check module files
        run: |
          go mod tidy
          git diff --exit-code -- go.mod go.sum

  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Install ShellCheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Run ShellCheck
        run: |
          shellcheck examples/advanced-tuning/verify-ovn-dpdk-binding.sh

  hadolint:
    name: Hadolint
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Run Hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: docker/Dockerfile
          ignore: DL3008,DL3059,DL3015

  docker-build:
    name: Docker build
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Build userspace CNI image
        run: docker build . -f docker/Dockerfile -t userspacecni:ci
