---
# Dedicated identity for the on-host userspace CNI binary. Least privilege: it
# only needs to read the workload pod (to find its shared-dir volume) and write
# the provisioned interface config back (via the pods/status subresource).
apiVersion: v1
kind: ServiceAccount
metadata:
  name: userspace-cni
  namespace: kube-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: userspace-cni
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get"]
  - apiGroups: [""]
    resources: ["pods/status"]
    verbs: ["update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: userspace-cni
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: userspace-cni
subjects:
  - kind: ServiceAccount
    name: userspace-cni
    namespace: kube-system
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: userspace-cni
  namespace: kube-system
spec:
  selector:
    matchLabels:
      app: userspace-cni
  template:
    metadata:
      labels:
        app: userspace-cni
    spec:
      serviceAccountName: userspace-cni
      tolerations:
        - operator: Exists
          effect: NoSchedule
      containers:
      - name: userspace-cni-plugin
        # Alpine-built image; the binary lives at /userspace inside the image.
        image: ghcr.io/fivetime/userspace-cni:main
        imagePullPolicy: IfNotPresent
        securityContext:
           allowPrivilegeEscalation: false
           privileged: false
        resources:
          requests:
             cpu: 1m
             memory: 1Mi
          limits:
             cpu: 100m
             memory: 30Mi
        env:
          # Where the generated kubeconfig lands on the host (under the CNI conf
          # dir, mounted below). The NetworkAttachmentDefinition's "kubeconfig"
          # field must point at the host path:
          #   /etc/cni/net.d/userspace.d/userspace.kubeconfig
          - name: KUBECONFIG_DIR
            value: /host/etc/cni/net.d/userspace.d
        volumeMounts:
        - name: cnibin
          mountPath: /opt/cni/bin
        - name: cni-net-dir
          mountPath: /host/etc/cni/net.d
        # Explicit SA token + CA at the standard path (TokenRequest projection),
        # so this works even where automatic token mounting is disabled.
        - name: kube-api-access
          mountPath: /var/run/secrets/kubernetes.io/serviceaccount
          readOnly: true
        # 1) Deliver the CNI binary onto the host.
        # 2) Generate a kubeconfig for that binary from THIS pod's ServiceAccount
        #    token + cluster CA. The binary is invoked per-Pod by the node runtime
        #    in the kubelet's CNI context, where there is no in-cluster token — so
        #    it needs a kubeconfig FILE on the node (the classic Multus delegate
        #    pattern). Thick Multus no longer ships multus.kubeconfig, so we provide
        #    our own, decoupled from any other component.
        # 3) Regenerate periodically: the projected SA token is short-lived and the
        #    kubelet rotates it in this pod's filesystem, so we refresh the embedded
        #    token well before it expires.
        # We then idle so the DaemonSet stays Running (no CrashLoopBackOff churn).
        command: ["/bin/sh", "-c"]
        args:
        - |
          cp -f /userspace /opt/cni/bin/userspace
          echo "userspace-cni installed to /opt/cni/bin/userspace"

          SA=/var/run/secrets/kubernetes.io/serviceaccount
          KCFG="$KUBECONFIG_DIR/userspace.kubeconfig"
          write_kubeconfig() {
            host="$KUBERNETES_SERVICE_HOST"
            case "$host" in *:*) host="[$host]";; esac   # bracket IPv6
            ca=$(base64 < "$SA/ca.crt" | tr -d '\n')
            tok=$(cat "$SA/token")
            mkdir -p "$KUBECONFIG_DIR"
            cat > "$KCFG.tmp" <<EOF
          apiVersion: v1
          kind: Config
          clusters:
          - name: local
            cluster:
              server: https://${host}:${KUBERNETES_SERVICE_PORT}
              certificate-authority-data: ${ca}
          users:
          - name: userspace-cni
            user:
              token: "${tok}"
          contexts:
          - name: default
            context:
              cluster: local
              user: userspace-cni
          current-context: default
          EOF
            chmod 600 "$KCFG.tmp"
            mv -f "$KCFG.tmp" "$KCFG"
          }

          write_kubeconfig && echo "wrote $KCFG" || echo "WARN: failed to write $KCFG"
          while true; do
            sleep 300
            write_kubeconfig || echo "WARN: kubeconfig refresh failed"
          done
      volumes:
        - name: cnibin
          hostPath:
            path: /opt/cni/bin
        - name: cni-net-dir
          hostPath:
            path: /etc/cni/net.d
        - name: kube-api-access
          projected:
            sources:
              - serviceAccountToken:
                  path: token
                  expirationSeconds: 3600
              - configMap:
                  name: kube-root-ca.crt
                  items:
                    - key: ca.crt
                      path: ca.crt
              - downwardAPI:
                  items:
                    - path: namespace
                      fieldRef:
                        fieldPath: metadata.namespace
