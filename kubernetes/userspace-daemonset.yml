---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: userspace-cni
  namespace: kube-system
spec:
  selector:
    matchLabels:
      app: userspace-cni
  template:
    metadata:
      labels:
        app: userspace-cni
    spec:
      tolerations:
        - operator: Exists
          effect: NoSchedule
      containers:
      - name: userspace-cni-plugin
        # Alpine-built image; the binary lives at /userspace inside the image
        # (legacy ligato image had it at /root/userspace-cni-network-plugin/userspace/userspace).
        image: ghcr.io/fivetime/userspace-cni:main
        imagePullPolicy: IfNotPresent
        securityContext:
           allowPrivilegeEscalation: false
           privileged: false
        resources:
          requests:
             cpu: 1m
             memory: 1Mi
          limits:
             cpu: 100m
             memory: 30Mi
        volumeMounts:
        - name: cnibin
          mountPath: /opt/cni/bin
        # Copy the binary onto the host's CNI bin dir, then idle so the Pod
        # stays Running. The CNI is invoked per-Pod by the node runtime, not by
        # this container — it only delivers the binary. We idle (rather than let
        # the container exit) so the DaemonSet doesn't churn through restarts and
        # show a misleading CrashLoopBackOff.
        command: ["/bin/sh", "-c"]
        args:
        - |
          cp -f /userspace /opt/cni/bin/userspace
          echo "userspace-cni installed to /opt/cni/bin/userspace"
          while true; do sleep 3600; done
      volumes:
        - name: cnibin
          hostPath:
            path: /opt/cni/bin
